# codex-review の動作設定
# 環境ごとに config.yml にコピーして編集する

# 各イベント種別の設定
events:
  push:
    enabled: true
    # "all": 全 push を自動レビュー
    # "protected-only": Protected Branch への push だけ自動レビュー (推奨)
    mode: protected-only
  pull_request:
    enabled: true
    # ここに含まれる PR action だけ自動レビュー。他は mention 待ち
    # 例: opened だけ自動、synchronize 後の再レビューは @CodexRabbit[bot] をコメントで呼ぶ
    autoReviewOn:
      - opened
  issues:
    enabled: true
    # 空配列なら全アクションが mention 待ち (自動レビューしない)
    autoReviewOn: []

# PR/Issue コメント経由の mention 検出
mention:
  # コメント本文にこれらの文字列が含まれるとレビューを実行
  # 空配列にすると mention 機能そのものを無効化
  triggers:
    - "@CodexRabbit[bot]"

# レビュー対象の絞り込み (いずれも空なら全て対象)
filters:
  # 許可するリポジトリ ("owner/repo" 完全一致。ワイルドカードは "owner/*" をサポート)
  repositories: []
  # push で対象にするブランチ (refs/heads/... の末尾と完全一致)
  branches: []
  # draft PR をスキップする
  skipDraftPullRequests: true
  # bot ユーザー (sender.type == Bot) をスキップする
  skipBotSenders: true

# レビュー生成の挙動
review:
  # diff 自体の最大文字数 (超える場合は切り詰める)
  maxDiffChars: 200000
  # clone 時の shallow depth (0 以下で full clone)
  cloneDepth: 50
  # レビュー対象とするファイル拡張子 (空なら全て)
  includeExtensions: []
  # 無視するパス (glob 風の単純一致)
  excludePaths:
    - node_modules/**
    - dist/**
    - build/**
    - "*.lock"
    - pnpm-lock.yaml
    - package-lock.json
    - yarn.lock

# GitHub へのフィードバック (GitHub App 認証で CodexRabbit[bot] として投稿)
github:
  # PR にレビューコメントとして投稿する
  prReviewComment: true
  # push レビューで head コミットにコメントを投稿する
  pushCommitComment: true
  # push レビューで Critical/High が見つかった場合 Issue を作成する
  pushIssueOnSevere: true

# Discord 連携
discord:
  # false にすると Discord 連携を完全に無効化 (環境変数 DISCORD_* も不要になる)
  enabled: true
  # 1 メッセージの最大文字数 (Discord の上限は 2000)
  chunkSize: 1900
  # スレッドの自動アーカイブ (分)。60, 1440, 4320, 10080 のいずれか
  threadAutoArchiveMinutes: 1440
  # スレッド内で Bot への返信/メンションを対話として扱うか
  enableThreadChat: true

# 対話用 workspace (clone ディレクトリ) のライフサイクル
workspace:
  # 非活性スレッドに紐づく clone を自動回収するまでの分数 (10 分間隔で sweep)
  ttlMinutes: 1440
